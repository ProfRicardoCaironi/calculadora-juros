<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal de Projetos - Calculadora de Juros</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="hero">
      <div class="hero-content">
        <h1>Calculadora de Juros</h1>

        <p class="subtitulo">
          Projeto Interdisciplinar de Matemática e Desenvolvimento de Sistemas
        </p>

        <div class="professores">
          <span>Profª Fernanda F. Gaiotto</span>
          <span>Prof. Ricardo Caironi</span>
        </div>

        <div class="estatisticas">
          <div class="box-info">
            <strong id="totalProjetos">0</strong>
            <span>Projetos</span>
          </div>

          <div class="box-info">
            <strong>2º EM DS</strong>
            <span>Turma</span>
          </div>

          <div class="box-info">
            <strong>2026</strong>
            <span>Ano Letivo</span>
          </div>
        </div>

        <input type="text" id="pesquisa" placeholder="🔍 Pesquisar aluno..." />
      </div>
    </header>

    <main>
      <section class="container-alunos" id="listaAlunos"></section>
    </main>

    <footer>Projeto desenvolvido pelos alunos do 2º EM DS</footer>

    <script src="script.js"></script>
  </body>
</html>
